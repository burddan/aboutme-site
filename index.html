<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Portfolio</title>
  <link rel="stylesheet" href="themes.css" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="dwm-bar">
    <div class="bar-tags">
      <span class="tag active">1</span>
      <span class="tag">2</span>
      <span class="tag">3</span>
      <span class="tag">4</span>
      <span class="tag">5</span>
      <span class="tag">6</span>
      <span class="tag">7</span>
      <span class="tag">8</span>
      <span class="tag">9</span>
    </div>
    <div class="bar-title">terminal</div>
    <div class="bar-status">
      <span class="status-item" id="bar-date"></span>
    </div>
  </div>

  <div class="desktop">
    <div class="window" id="terminal-window">
      <div class="window-titlebar">
        <span class="window-title">terminal</span>
        <div class="window-controls">
          <button class="btn-close" onclick="closeWindow('terminal-window')"></button>
        </div>
      </div>
      <div class="window-body">
        <div class="terminal">
          <div class="terminal-line">
            <span class="prompt">burddan@arch ~$ </span><span id="typed-output"></span>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/typed.js@2.1.0/dist/typed.umd.js"></script>
  <script src="main.js"></script>
</body>
</html>
