<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Portfolio</title>
  <link rel="stylesheet" href="themes.css" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div id="boot-screen">
    <div id="boot-output"></div>
  </div>
  <div class="dwm-bar">
    <div class="bar-tags">
      <span class="tag active" data-ws="aboutme" data-title="About me" data-jp="自己紹介"><span class="tag-icon">󰙍</span> aboutme</span>
      <span class="tag" data-ws="projects" data-title="Projects" data-jp="作品集"><span class="tag-icon">󰲋</span> projects</span>
      <span class="tag" data-ws="contact" data-title="Contact" data-jp="連絡先"><span class="tag-icon">󰇮</span> contact</span>
      <span class="tag" data-ws="support" data-title="Support me" data-jp="支援"><span class="tag-icon">󰋑</span> support me</span>
    </div>
    <div class="bar-title" id="bar-title">About me <span class="bar-title-jp">自己紹介</span></div>
    <div class="bar-status">
      <span class="status-item" id="bar-date"></span>
    </div>
  </div>

  <div class="desktop">

    <!-- workspace: aboutme -->
    <div class="workspace active" id="ws-aboutme">
      <div class="window">
        <div class="window-body">
          <div class="terminal">
            <div class="terminal-line">
              <span class="prompt">burddan@arch ~$ </span><span id="typed-output"></span>
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- workspace: projects -->
    <div class="workspace" id="ws-projects">
      <div class="window">
        <div class="window-body">
          <div class="terminal">
            <div class="terminal-line">
              <span class="prompt">burddan@arch ~$ </span><span>ls ~/projects</span>
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- workspace: support -->
    <div class="workspace" id="ws-support">
      <div class="window">
        <div class="window-body">
          <div class="terminal">
            <div class="terminal-line">
              <span class="prompt">burddan@arch ~$ </span><span>cat support.txt</span>
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- workspace: contact -->
    <div class="workspace" id="ws-contact">
      <div class="window">
        <div class="window-body">
          <div class="terminal">
            <div class="terminal-line">
              <span class="prompt">burddan@arch ~$ </span><span>cat contact.txt</span>
            </div>
          </div>
        </div>
      </div>
    </div>

  </div>

  <div class="manual">
    <div class="manual-title">keybinds</div>
    <div class="manual-item"><span class="manual-key">double click</span> tile / float window</div>
    <div class="manual-item"><span class="manual-key">q</span> open terminal</div>
    <div class="manual-item"><span class="manual-key">w</span> close terminal</div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/typed.js@2.1.0/dist/typed.umd.js"></script>
  <script src="main.js"></script>
</body>
</html>
